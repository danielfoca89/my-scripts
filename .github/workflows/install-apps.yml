name: Install & Secure Applications

on:
  workflow_dispatch:
    inputs:
      vps_ip:
        description: 'Target VPS IP'
        required: true
      ssh_user:
        description: 'Admin Username'
        required: true
      ssh_password:
        description: 'Admin Password'
        required: true
      ssh_port:
        description: 'SSH Port'
        default: '2222'
        required: true
      wg_password:
        description: 'WireGuard Password (Optional)'
        required: false
      domain:
        description: 'Domain (Optional, for Web Apps)'
        required: false
      email:
        description: 'Email (Optional, for SSL)'
        required: false
      selection:
        description: 'Select Application'
        required: true
        type: choice
        options:
          # --- DOCKER APPS ---
          - "Docker > Arcane | docker/arcane"
          - "Docker > Engine | docker/engine"
          - "Docker > Grafana | docker/grafana"
          - "Docker > MariaDB | docker/mariadb"
          - "Docker > MongoDB | docker/mongodb"
          - "Docker > n8n Automation | docker/n8n"
          - "Docker > Netdata | docker/netdata"
          - "Docker > Portainer | docker/portainer"
          - "Docker > PostgreSQL | docker/postgres"
          - "Docker > Prometheus | docker/prometheus"
          - "Docker > Redis | docker/redis"
          - "Docker > Uptime Kuma | docker/uptime-kuma"
          
          # --- HOST APPS ---
          - "Host > Certbot SSL | host/certbot"
          - "Host > Log Maintenance | host/log-maintenance"
          - "Host > Nginx Web Server | host/nginx"
          - "Host > NodeJS Runtime | host/nodejs"
          - "Host > Security Audit | host/security-audit"
          - "Host > WireGuard VPN | host/wireguard"

jobs:
  deploy-app:
    name: Install ${{ inputs.selection }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Script Path Dynamically
        id: resolve
        run: |
          # 1. Extract script name from input (right side)
          # Ex: "Infrastructure | docker" -> "docker"
          SCRIPT_KEY=$(echo "${{ inputs.selection }}" | awk -F ' \\| ' '{print $2}')
          
          echo "[SEARCH] Searching for install.sh for app: $SCRIPT_KEY..."
          
          # 2. Search recursively in apps/ folder for the specific app folder
          # We look for a folder named exactly like the key, containing install.sh
          # Ex: apps/docker/n8n/install.sh
          FOUND_PATH=$(find apps -type f -path "*/$SCRIPT_KEY/install.sh" -print -quit)
          
          if [ -z "$FOUND_PATH" ]; then
            echo "[ERROR] Error: Could not find install.sh for '$SCRIPT_KEY'!"
            echo "Expected path pattern: apps/*/$SCRIPT_KEY/install.sh"
            exit 1
          fi
          
          echo "[OK] Found script at: $FOUND_PATH"
          
          # 3. Calculate relative path for VPS execution
          # Remove "apps/" prefix because on VPS we will have /tmp/apps/
          # Ex: "apps/docker/n8n/install.sh" -> "docker/n8n/install.sh"
          RELATIVE_PATH=${FOUND_PATH#apps/}
          
          # Save to Environment Variable
          echo "REMOTE_SCRIPT_PATH=$RELATIVE_PATH" >> $GITHUB_ENV

      - name: Install SSH Tools
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload Entire App Library
        run: |
          echo "Uploading apps/ and lib/ folder structure to VPS..."
          # Upload recursively (-r) the apps and lib folders to /tmp
          # Folder structure is preserved on the server!
          sshpass -p "${{ inputs.ssh_password }}" scp -o StrictHostKeyChecking=no -P ${{ inputs.ssh_port }} \
            -r apps lib ${{ inputs.ssh_user }}@${{ inputs.vps_ip }}:/tmp/
          
          echo "[OK] Library uploaded."

      - name: Execute Installer
        run: |
          echo "Executing: /tmp/apps/${{ env.REMOTE_SCRIPT_PATH }}"
          
          sshpass -p "${{ inputs.ssh_password }}" ssh -o StrictHostKeyChecking=no -p ${{ inputs.ssh_port }} \
            ${{ inputs.ssh_user }}@${{ inputs.vps_ip }} "
              # Make ALL scripts executable recursively
              chmod -R +x /tmp/apps/ /tmp/lib/
              
              # Set sudo password
              export SUDO_PASS='${{ inputs.ssh_password }}'
              export WG_PASSWORD='${{ inputs.wg_password }}'
              
              # Construct Arguments
              ARGS=""
              if [ -n "${{ inputs.domain }}" ]; then
                  ARGS="$ARGS --domain ${{ inputs.domain }}"
              fi
              if [ -n "${{ inputs.email }}" ]; then
                  ARGS="$ARGS --email ${{ inputs.email }}"
              fi
              
              # Execute the script using the dynamically found path
              bash /tmp/apps/${{ env.REMOTE_SCRIPT_PATH }} $ARGS
              
              # Cleanup - Remove the uploaded scripts to keep VPS clean
              echo '[CLEANUP] Cleaning up installation scripts...'
              rm -rf /tmp/apps /tmp/lib
            "