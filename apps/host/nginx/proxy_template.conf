server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};

    # Security & General Configuration
    include /etc/nginx/snippets/security.conf;
    include /etc/nginx/snippets/general.conf;

    # Logging
    access_log /var/log/nginx/{{DOMAIN}}.access.log;
    error_log /var/log/nginx/{{DOMAIN}}.error.log;

    location / {
        proxy_pass http://{{UPSTREAM}};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support (Required for n8n and others)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Performance & Streaming Optimizations
        proxy_buffering off;  # Crucial for streaming/SSE/n8n
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 0; # Let the backend app handle file size limits

        # Timeouts (Optional, good for long running processes)
        proxy_read_timeout 3600;
    }
}
